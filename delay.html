<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container{ background: #cecece; padding: 10px; display: flex; width: 250px; height: 150px; justify-content: space-between; align-items: center; }
    .bar { height: 100%; width: 50px; background: blue; animation: load 1s infinite alternate; }
    @keyframes load {
      0% { height: 0%; }
      100% { height: 100%; }
    }
    .bar-2 { animation-delay: 0.2s; }
    .bar-3 { animation-delay: 0.4s; }
    .bar-4 { animation-delay: 0.6s; }
  </style>
</head>
<body>
  <div class="container">
    <div class="bar bar-1"></div>
    <div class="bar bar-2"></div>
    <div class="bar bar-3"></div>
    <div class="bar bar-4"></div>
  </div>
</body>
</html>
